name: Volume File Trigger

on:
  schedule:
    - cron: '0 6 * * *'        # runs once daily at 11:30 AM IST (6:00 AM UTC)
  workflow_dispatch:          # allows manual triggering from GitHub UI

permissions:
  actions: write              # needed to trigger deploy.yml
  contents: write             # needed to push .last_file_count

env:
  DATABRICKS_HOST: https://dbc-ccb24871-81f0.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get OAuth Token
        id: auth
        run: |
          TOKEN=$(curl -s -X POST \
            "$DATABRICKS_HOST/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$DATABRICKS_CLIENT_ID&client_secret=$DATABRICKS_CLIENT_SECRET&scope=all-apis" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Check for new files in dev volume
        id: check_files
        run: |
          # List files using Databricks REST API
          echo "Attempting to list files from /Volumes/dev_catalog/dev_schema/data/ ..."
          
          # Use the Files API to list volume contents
          RESPONSE=$(curl -s -X GET \
            "$DATABRICKS_HOST/api/2.0/fs/directories/Volumes/dev_catalog/dev_schema/data/" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          
          echo "API Response:"
          echo "$RESPONSE"
          
          # Count files (exclude directories)
          FILE_COUNT=$(echo "$RESPONSE" | jq '[.contents[]? | select(.is_directory == false)] | length' 2>/dev/null || echo "0")
          
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

          # Read last known count
          LAST_COUNT=$(cat .last_file_count 2>/dev/null || echo "0")
          echo "last_count=$LAST_COUNT" >> $GITHUB_OUTPUT

          echo "Current files: $FILE_COUNT, Last known: $LAST_COUNT"

          if [ "$FILE_COUNT" -gt "$LAST_COUNT" ]; then
            echo "new_files=true" >> $GITHUB_OUTPUT
            echo "✓ New files detected! Triggering pipeline..."
          else
            echo "new_files=false" >> $GITHUB_OUTPUT
            echo "No new files detected."
          fi

      - name: Save current file count
        if: steps.check_files.outputs.new_files == 'true'
        run: |
          echo "${{ steps.check_files.outputs.file_count }}" > .last_file_count
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .last_file_count
          git commit -m "chore: update file count tracker [skip ci]" || true
          git push || true

      - name: Trigger main pipeline if new files found
        if: steps.check_files.outputs.new_files == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
