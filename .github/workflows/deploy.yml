name: Databricks CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '.last_file_count'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual pipeline run'

env:
  DATABRICKS_HOST: https://dbc-ccb24871-81f0.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Get OAuth Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://dbc-ccb24871-81f0.cloud.databricks.com/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$DATABRICKS_CLIENT_ID&client_secret=$DATABRICKS_CLIENT_SECRET&scope=all-apis" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "Token length: ${#TOKEN}"

      - name: Deploy to Dev
        run: databricks bundle deploy --target dev --force-lock

      - name: Stop any active dev pipeline run
        run: |
          PIPELINE_ID=$(curl -s \
            "$DATABRICKS_HOST/api/2.0/pipelines" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            | jq -r '.statuses[] | select(.name=="dlt_dev") | .pipeline_id')
          echo "Pipeline ID: $PIPELINE_ID"
          if [ -n "$PIPELINE_ID" ]; then
            curl -s -X POST \
              "$DATABRICKS_HOST/api/2.0/pipelines/$PIPELINE_ID/stop" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" || true
            echo "Stop signal sent"
          fi

      - name: Run DLT Pipeline in Dev
        run: databricks bundle run dlt_pipeline --target dev

      - name: Run Sync Job in Dev
        continue-on-error: true
        run: databricks bundle run sync_job --target dev

      - name: Wait before next environment
        run: sleep 60

  stg:
    needs: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Get OAuth Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://dbc-ccb24871-81f0.cloud.databricks.com/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$DATABRICKS_CLIENT_ID&client_secret=$DATABRICKS_CLIENT_SECRET&scope=all-apis" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Staging
        run: databricks bundle deploy --target stg --force-lock

      - name: Stop any active stg pipeline run
        run: |
          PIPELINE_ID=$(curl -s \
            "$DATABRICKS_HOST/api/2.0/pipelines" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            | jq -r '.statuses[] | select(.name=="dlt_stg") | .pipeline_id')
          echo "Pipeline ID: $PIPELINE_ID"
          if [ -n "$PIPELINE_ID" ]; then
            curl -s -X POST \
              "$DATABRICKS_HOST/api/2.0/pipelines/$PIPELINE_ID/stop" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" || true
            echo "Stop signal sent"
          fi

      - name: Run DLT Pipeline in Staging
        run: databricks bundle run dlt_pipeline --target stg

      - name: Wait before next environment
        run: sleep 60

  prod:
    needs: stg
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Get OAuth Token
        id: token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://dbc-ccb24871-81f0.cloud.databricks.com/oidc/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$DATABRICKS_CLIENT_ID&client_secret=$DATABRICKS_CLIENT_SECRET&scope=all-apis" \
            | jq -r '.access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Production
        run: databricks bundle deploy --target prod --force-lock

      - name: Stop any active prod pipeline run
        run: |
          PIPELINE_ID=$(curl -s \
            "$DATABRICKS_HOST/api/2.0/pipelines" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            | jq -r '.statuses[] | select(.name=="dlt_prod") | .pipeline_id')
          echo "Pipeline ID: $PIPELINE_ID"
          if [ -n "$PIPELINE_ID" ]; then
            curl -s -X POST \
              "$DATABRICKS_HOST/api/2.0/pipelines/$PIPELINE_ID/stop" \
              -H "Authorization: Bearer ${{ steps.token.outputs.token }}" || true
            echo "Stop signal sent"
          fi

      - name: Run DLT Pipeline in Production
        run: databricks bundle run dlt_pipeline --target prod
