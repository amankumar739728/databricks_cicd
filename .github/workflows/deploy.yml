name: Databricks CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '.last_file_count'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual pipeline run'

env:
  DATABRICKS_HOST: https://dbc-ccb24871-81f0.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Dev
        run: databricks bundle deploy --target dev --force-lock

      - name: Stop any active dev pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_dev \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Dev
        run: databricks bundle run dlt_pipeline --target dev

      - name: Sync data files from dev to stg and prod volumes
        continue-on-error: true
        run: |
          # Get cluster id
          CLUSTER_ID=$(databricks clusters list --output json | jq -r '[.[] | select(.state=="RUNNING")] | .[0].cluster_id // empty')

          if [ -z "$CLUSTER_ID" ]; then
            echo "No running cluster found, using serverless..."
            databricks jobs submit --wait \
              --json '{
                "run_name": "sync_volumes",
                "tasks": [{
                  "task_key": "sync",
                  "notebook_task": {
                    "notebook_path": "/Workspace/Users/aman.kumar@gyansys.com/databricks_cicd/notebooks/sync_volumes",
                    "source": "WORKSPACE"
                  },
                  "environment_key": "default",
                  "serverless": true
                }]
              }'
          else
            echo "Using cluster: $CLUSTER_ID"
            databricks jobs submit --wait \
              --json "{
                \"run_name\": \"sync_volumes\",
                \"tasks\": [{
                  \"task_key\": \"sync\",
                  \"notebook_task\": {
                    \"notebook_path\": \"/Workspace/Users/aman.kumar@gyansys.com/databricks_cicd/notebooks/sync_volumes\",
                    \"source\": \"WORKSPACE\"
                  },
                  \"existing_cluster_id\": \"$CLUSTER_ID\"
                }]
              }"
          fi

      - name: Wait before next environment
        run: sleep 60

  stg:
    needs: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Staging
        run: databricks bundle deploy --target stg --force-lock

      - name: Stop any active stg pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_stg \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Staging
        run: databricks bundle run dlt_pipeline --target stg

      - name: Wait before next environment
        run: sleep 60

  prod:
    needs: stg
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Production
        run: databricks bundle deploy --target prod --force-lock

      - name: Stop any active prod pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_prod \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Production
        run: databricks bundle run dlt_pipeline --target prod