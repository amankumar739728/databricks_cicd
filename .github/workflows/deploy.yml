name: Databricks CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual pipeline run'

env:
  DATABRICKS_HOST: https://dbc-ccb24871-81f0.cloud.databricks.com
  DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
  DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

jobs:
  dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Dev
        run: databricks bundle deploy --target dev --force-lock

      - name: Stop any active dev pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_dev \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Dev
        run: databricks bundle run dlt_pipeline --target dev

      - name: Sync data files from dev to stg and prod volumes
        continue-on-error: true
        run: |
          python3 - << 'PYTHON'
          import subprocess
          import json
          import sys

          def run_cmd(cmd):
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"Warning: {result.stderr}")
              return result.stdout

          # List files in dev volume
          output = run_cmd([
              "databricks", "fs", "ls",
              "dbfs:/Volumes/dev_catalog/dev_schema/data/",
              "--output", "json"
          ])

          if not output.strip():
              print("No files found in dev volume")
              sys.exit(0)

          files = json.loads(output)
          print(f"Found {len(files)} files to sync")

          targets = [
              "dbfs:/Volumes/stg_catalog/stg_schema/data/",
              "dbfs:/Volumes/prod_catalog/prod_schema/data/"
          ]

          for f in files:
              filename = f["path"].split("/")[-1]
              src = f"dbfs:/Volumes/dev_catalog/dev_schema/data/{filename}"

              for target in targets:
                  dest = f"{target}{filename}"
                  print(f"Copying {filename} to {target}...")
                  run_cmd([
                      "databricks", "fs", "cp",
                      src, dest,
                      "--overwrite"
                  ])
                  print(f"✓ Synced {filename} to {target}")

          print("Sync completed!")
          PYTHON

      - name: Wait before next environment
        run: sleep 60

  stg:
    needs: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Staging
        run: databricks bundle deploy --target stg --force-lock

      - name: Stop any active stg pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_stg \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Staging
        run: databricks bundle run dlt_pipeline --target stg

      - name: Wait before next environment
        run: sleep 60

  prod:
    needs: stg
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to Production
        run: databricks bundle deploy --target prod --force-lock

      - name: Stop any active prod pipeline run
        run: |
          databricks pipelines stop $(databricks pipelines list-updates \
            --pipeline-id $(databricks pipelines get-by-name dlt_prod \
            --output json | jq -r '.pipeline_id') \
            --output json | jq -r '.updates[0].update_id') || true

      - name: Run DLT Pipeline in Production
        run: databricks bundle run dlt_pipeline --target prod