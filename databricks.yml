bundle:
  name: dlt-pipeline-project

targets:
  dev:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_dev
          catalog: dev_catalog
          schema: dev_schema
          serverless: true
          allow_duplicate_names: true
          configuration:
            input_path: /Volumes/dev_catalog/dev_schema/data/
          libraries:
            - file:
                path: ./notebooks/bronze.py
            - file:
                path: ./notebooks/silver.py
            - file:
                path: ./notebooks/gold.py

      jobs:
        sync_job:
          name: sync_volumes_dev
          tasks:
            - task_key: sync
              notebook_task:
                notebook_path: ./notebooks/sync_volumes.py
                source: WORKSPACE

  stg:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_stg
          catalog: stg_catalog
          schema: stg_schema
          serverless: true
          allow_duplicate_names: true
          configuration:
            input_path: /Volumes/stg_catalog/stg_schema/data/
          libraries:
            - file:
                path: ./notebooks/bronze.py
            - file:
                path: ./notebooks/silver.py
            - file:
                path: ./notebooks/gold.py

  prod:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_prod
          catalog: prod_catalog
          schema: prod_schema
          serverless: true
          allow_duplicate_names: true
          configuration:
            input_path: /Volumes/prod_catalog/prod_schema/data/
          libraries:
            - file:
                path: ./notebooks/bronze.py
            - file:
                path: ./notebooks/silver.py
            - file:
                path: ./notebooks/gold.py
