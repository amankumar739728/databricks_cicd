bundle:
  name: dlt-pipeline-project

targets:
  dev:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_dev
          catalog: dev_catalog
          schema: dev_schema
          configuration:
            input_path: /Volumes/dev_catalog/dev_schema/data/Customers.csv
          libraries:
            - notebook: { path: notebooks/bronze.py }
            - notebook: { path: notebooks/silver.py }
            - notebook: { path: notebooks/gold.py }

  stg:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_stg
          catalog: stg_catalog
          schema: stg_schema
          configuration:
            input_path: /Volumes/stg_catalog/stg_schema/data/Customers.csv
          libraries:
            - notebook: { path: notebooks/bronze.py }
            - notebook: { path: notebooks/silver.py }
            - notebook: { path: notebooks/gold.py }

  prod:
    workspace:
      host: https://dbc-ccb24871-81f0.cloud.databricks.com
    resources:
      pipelines:
        dlt_pipeline:
          name: dlt_prod
          catalog: prod_catalog
          schema: prod_schema
          configuration:
            input_path: /Volumes/prod_catalog/prod_schema/data/Customers.csv
          libraries:
            - notebook: { path: notebooks/bronze.py }
            - notebook: { path: notebooks/silver.py }
            - notebook: { path: notebooks/gold.py }